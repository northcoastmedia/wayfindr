name: wayfindr-self-hosting

x-wayfindr-app: &wayfindr-app
  image: ${WAYFINDR_IMAGE:-wayfindr-server:local}
  build:
    context: ../..
    dockerfile: docker/self-hosting/server.Dockerfile
    target: runtime
    args:
      PHP_VERSION: ${WAYFINDR_PHP_VERSION:-8.4}
      NODE_VERSION: ${WAYFINDR_NODE_VERSION:-24}
  restart: unless-stopped
  working_dir: /app/apps/server
  env_file:
    - ${WAYFINDR_ENV_FILE:-.env}
  environment:
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
  volumes:
    - wayfindr-storage:/app/apps/server/storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    <<: *wayfindr-app
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "${WAYFINDR_HTTP_BIND:-127.0.0.1:8000}:8000"

  queue:
    <<: *wayfindr-app
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=90"]

  scheduler:
    <<: *wayfindr-app
    command: ["php", "artisan", "schedule:work"]

  reverb:
    <<: *wayfindr-app
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${WAYFINDR_REVERB_BIND:-127.0.0.1:8080}:8080"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wayfindr}
      POSTGRES_USER: ${POSTGRES_USER:-wayfindr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - wayfindr-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - wayfindr-redis:/data

volumes:
  wayfindr-storage:
  wayfindr-postgres:
  wayfindr-redis:
