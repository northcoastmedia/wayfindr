# The official Wayfindr self-hosting stack.
#
# Two TLS modes, one knob:
#   SERVER_NAME=support.example.com  -> FrankenPHP binds 80/443 and obtains
#                                       Let's Encrypt certificates itself.
#   SERVER_NAME=:80 (default)        -> plain HTTP; the loopback ops site on
#                                       :8000 serves health probes and
#                                       operator-managed proxies in EVERY mode.
#
# Reverb websockets are proxied by the web service under the same hostname
# (/app and /apps paths), so one domain and one certificate cover everything.

name: wayfindr-self-hosting

# This file is pull-only by design: the installer drops it into a directory
# with no source tree, so a build context here would be meaningless. Building
# from a repo checkout uses the compose.build.yml overlay.
x-wayfindr-app: &wayfindr-app
  image: ${WAYFINDR_IMAGE:-ghcr.io/adamgreenwell/wayfindr:latest}
  restart: unless-stopped
  env_file:
    - ${WAYFINDR_ENV_FILE:-.env}
  environment:
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
  volumes:
    - wayfindr-storage:/app/apps/server/storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    <<: *wayfindr-app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Server-side event posting goes to the reverb service directly;
      # browsers use the REVERB_CLIENT_* values. The interpolated defaults
      # keep a pre-client-vars env working: its public REVERB_* values (from
      # the SAME file via --env-file) become the browser values instead of
      # being shadowed by the internal override above.
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_CLIENT_HOST: ${REVERB_CLIENT_HOST:-${REVERB_HOST:-}}
      REVERB_CLIENT_PORT: ${REVERB_CLIENT_PORT:-${REVERB_PORT:-}}
      REVERB_CLIENT_SCHEME: ${REVERB_CLIENT_SCHEME:-${REVERB_SCHEME:-}}
      # Fresh installs and upgrades converge without a manual exec; the
      # entrypoint waits for the database, then runs migrations once.
      WAYFINDR_AUTO_MIGRATE: "1"
    # The PUBLIC_* names are deliberately new: a prototype-era env carried
    # WAYFINDR_HTTP_BIND=127.0.0.1:8000, which would double-map host port
    # 8000 here. Stale prototype vars are ignored, and the preserved proxy
    # upstream keeps working through the WAYFINDR_LOCAL_BIND default.
    ports:
      - "${WAYFINDR_PUBLIC_HTTP_BIND:-80}:80"
      - "${WAYFINDR_PUBLIC_HTTPS_BIND:-443}:443"
      - "${WAYFINDR_PUBLIC_HTTPS_BIND:-443}:443/udp"
      - "${WAYFINDR_LOCAL_BIND:-127.0.0.1:8000}:8000"
    # Caddy's ACME account and certificates must outlive the container —
    # re-issuing on every recreate runs into Let's Encrypt rate limits.
    volumes:
      - wayfindr-storage:/app/apps/server/storage
      - wayfindr-caddy-data:/data
      - wayfindr-caddy-config:/config
    healthcheck:
      # The loopback ops site on :8000 exists in every TLS mode, so one
      # plain probe is always valid — the public vhost never gates health.
      test:
        - CMD
        - php
        - -r
        - "exit(@file_get_contents('http://127.0.0.1:8000/up') !== false ? 0 : 1);"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # The base image ships a Caddy-admin healthcheck that only makes sense for
  # the web process — CLI workers disable it (queue/scheduler) or replace it
  # with a real port probe (reverb).
  queue:
    <<: *wayfindr-app
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=90"]
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    healthcheck:
      disable: true
    depends_on:
      web:
        condition: service_healthy

  scheduler:
    <<: *wayfindr-app
    command: ["php", "artisan", "schedule:work"]
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    healthcheck:
      disable: true
    depends_on:
      web:
        condition: service_healthy

  reverb:
    <<: *wayfindr-app
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - "exit(@fsockopen('127.0.0.1', 8080) ? 0 : 1);"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wayfindr}
      POSTGRES_USER: ${POSTGRES_USER:-wayfindr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - wayfindr-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - wayfindr-redis:/data

  # Optional malware scanning for attachments: enable with
  # `--profile clamav` and set WAYFINDR_ATTACHMENT_SCANNER=clamav plus
  # WAYFINDR_CLAMAV_SOCKET=tcp://clamav:3310 in the env file.
  # Needs ~1.5 GB of memory for signatures.
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    profiles: ["clamav"]
    volumes:
      - wayfindr-clamav:/var/lib/clamav

volumes:
  wayfindr-storage:
  wayfindr-caddy-data:
  wayfindr-caddy-config:
  wayfindr-postgres:
  wayfindr-redis:
  wayfindr-clamav:
