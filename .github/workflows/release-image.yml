# Builds and publishes the official self-hosting image. This is the ONLY CI
# in the repository, and it deliberately runs on version tags alone — tests
# and review happen through the PR loop, not here.

name: Release image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged ref
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wayfindr
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/self-hosting/server.Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            WAYFINDR_VERSION=${{ github.ref_name }}
            WAYFINDR_COMMIT=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A bare git tag creates no GitHub Release, and the installer resolves
      # releases/latest first — publish one so tag pushes alone keep installs
      # pinned (the installer also falls back to the tags API).
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Dash-suffixed tags (v0.1.0-alpha.1) are marked prerelease, which
          # keeps them out of releases/latest — so once a stable release
          # exists, installs prefer it over newer alphas; before any stable,
          # the installer's tags-API fallback still pins to the prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
